name: Build Addon

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build addon
        run: bun run build

      - name: Upload built addon
        uses: actions/upload-artifact@v4
        with:
          name: qobuz-tidal-addon
          path: dist/*.js

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          files: dist/*.js
          prerelease: false
