name: Build Addon

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build addon
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qobuz-tidal-addon
          path: dist/qobuz-tidal-addon.js

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: dist/qobuz-tidal-addon.js
          prerelease: false
